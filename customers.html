/* ── Customers page inline overrides ── */

/* ── GLOBAL TEXT CLARITY OVERRIDE ── */
* { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body { color: rgba(255,255,255,.92) !important; }

/* Heatmap global */
.hm-th { font-family:'IBM Plex Mono',monospace !important; font-weight:600 !important; }
.hm-sector { color:rgba(255,255,255,.88) !important; }
.hm-notes { color:rgba(255,255,255,.68) !important; font-size:11.5px !important; }
.cell-val { font-family:'IBM Plex Mono',monospace !important; font-size:14px !important; font-weight:700 !important; }

/* Cards global */
.co-name { font-size:15px !important; font-weight:700 !important; color:#ffffff !important; }
.co-sector { font-size:10px !important; color:rgba(255,255,255,.6) !important; }
.co-metric-label { font-family:'IBM Plex Mono',monospace !important; font-size:9px !important; color:rgba(255,255,255,.5) !important; letter-spacing:.1em !important; text-transform:uppercase !important; margin-bottom:4px !important; }
.co-metric-val { font-family:'IBM Plex Mono',monospace !important; font-size:18px !important; font-weight:700 !important; letter-spacing:-.02em !important; }

/* Summary strip */
.ss-label { font-family:'IBM Plex Mono',monospace !important; font-size:9px !important; color:rgba(255,255,255,.45) !important; letter-spacing:.15em !important; }
.ss-val { font-family:'IBM Plex Mono',monospace !important; font-weight:700 !important; }
.ss-note { font-size:10px !important; color:rgba(255,255,255,.5) !important; }

/* Modal */
.modal-title { font-size:20px !important; font-weight:700 !important; color:#ffffff !important; }
.modal-sector { font-size:11px !important; color:rgba(255,255,255,.6) !important; }
.tl-row { border-radius:4px !important; }
.modal-note-text { font-size:12px !important; color:rgba(255,255,255,.75) !important; line-height:1.6 !important; }

/* Search box */
.search-box { font-size:13px !important; color:rgba(255,255,255,.9) !important; }
.search-box::placeholder { color:rgba(255,255,255,.35) !important; }

/* Legend */
.leg-item { font-size:11px !important; color:rgba(255,255,255,.75) !important; font-weight:500 !important; }

/* Period/Metric tabs */
.ptab, .mtab { font-size:11px !important; }
.ptab.on { color:#FFD700 !important; font-weight:700 !important; }

/* Period tab — enhanced */
.period-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.ptab {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.12em;
  padding:5px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.55);
  cursor:pointer;
  transition:all .18s;
  border-radius:2px;
}
.ptab:hover { background:rgba(255,255,255,.09); color:#fff; border-color:rgba(255,255,255,.3); }
.ptab.on {
  background:rgba(255,215,0,.12);
  border-color:rgba(255,215,0,.6);
  color:#FFD700;
  box-shadow:0 0 12px rgba(255,215,0,.15);
}

/* Company card — sparkline area */
.co-card {
  transition: transform .18s, box-shadow .18s, border-color .18s !important;
}
.co-card:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 28px rgba(0,0,0,.4), 0 0 0 1px var(--card-accent, #FFD700) !important;
}

/* Timeline visual rows */
.tl-row {
  padding: 8px 12px !important;
  margin-bottom: 2px !important;
  border-radius: 3px;
}
.tl-period {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .14em;
  min-width: 56px;
  color: rgba(255,255,255,.4);
  padding-top: 2px;
}

/* Trend chart container */
.trend-chart-wrap {
  margin-bottom: 12px;
}

/* Heatmap bar pulse on hover */
.hm-row:hover .cell-inner { filter: brightness(1.15); }

/* Modal period-highlight ring */
.modal-period-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: .2em;
  color: rgba(255,215,0,.8);
  background: rgba(255,215,0,.06);
  border: 1px solid rgba(255,215,0,.25);
  display: inline-block;
  padding: 4px 16px;
  margin-bottom: 14px;
}

/* Sparkline label strip */
.spark-periods {
  display: flex;
  justify-content: space-between;
  padding: 0 2px;
  margin-top: 1px;
}
.spark-period-lbl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 6.5px;
  color: rgba(255,255,255,.22);
  text-align: center;
}

  <div class="summary-strip reveal" id="summary-strip"></div>

  <div class="analysis-panel">

    <div class="panel-section">
      <div class="panel-label">FILTER &amp; VIEW CONTROLS</div>
      <div class="controls">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.15em">时间段</div>

          <button class="ptab on" onclick="setPeriod(5)">2026Q1</button>
        </div>

  <div id="cards-container"></div>

// ══ UTILS ══════════════════════════════════════════════════════════
// ── SPARKLINE ─────────────────────────────────────────────────────
function buildSparkline(vals, accentColor) {
  const W = 180, H = 28, PAD = 2;
  const valid = vals.map((v, i) => ({v, i})).filter(x => x.v !== null && x.v !== undefined);
  if (valid.length < 2) return '<div style="height:28px;display:flex;align-items:center;justify-content:center"><span style=\'font-size:9px;color:rgba(255,255,255,.15);font-family:var(--mono)\'>数据不足</span></div>';

  const all = valid.map(x => x.v);
  const mn = Math.min(...all), mx = Math.max(...all);
  const range = mx - mn || 0.1;
  const xStep = (W - PAD*2) / (vals.length - 1);
  const yOf = v => H - PAD - ((v - mn) / range) * (H - PAD*2);

  // Points for all 6 slots (null = gap)
  const pts = vals.map((v, i) => v !== null ? {x: PAD + i*xStep, y: yOf(v), v, valid:true} : {x: PAD + i*xStep, y: H/2, v: null, valid:false});

  // Build polyline segments (skip gaps)
  let polylines = [], seg = [];
  pts.forEach(p => {
    if (p.valid) { seg.push(p); }
    else { if (seg.length > 1) polylines.push(seg); seg = []; }
  });
  if (seg.length > 1) polylines.push(seg);

  // Zero line
  const zeroY = H - PAD - ((0 - mn) / range) * (H - PAD*2);
  const zeroLine = (mn < 0 && mx > 0)
    ? `<line x1="${PAD}" y1="${zeroY}" x2="${W-PAD}" y2="${zeroY}" stroke="rgba(255,255,255,.12)" stroke-width="0.8" stroke-dasharray="2,3"/>`
    : '';

  // Gradient fill area
  const validSegs = polylines.filter(s => s.length >= 2);
  let fills = '';
  validSegs.forEach(seg => {
    const pathD = seg.map((p,i) => (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
    const fillPath = pathD + ` L${seg[seg.length-1].x.toFixed(1)},${H} L${seg[0].x.toFixed(1)},${H} Z`;
    fills += `<path d="${fillPath}" fill="url(#spkGrad_${accentColor.replace('#','').replace(',','_')})" opacity="0.18"/>`;
  });

  // Line paths
  let lines = '';
  validSegs.forEach(seg => {
    const d = seg.map((p,i) => (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
    lines += `<path d="${d}" fill="none" stroke="${accentColor}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>`;
  });

  // Dots at valid points
  const dots = pts.filter(p => p.valid).map(p => {
    const col = sigColor(p.v);
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.2" fill="${col}" stroke="rgba(6,12,28,.8)" stroke-width="1"/>`;
  }).join('');

  // Period labels on x-axis
  const labels = PERIODS.map((per, i) => {
    const x = PAD + i * xStep;
    return `<text x="${x.toFixed(1)}" y="${H+9}" text-anchor="middle" font-size="6.5" fill="rgba(255,255,255,.28)" font-family="var(--mono)">${per.slice(-2)}</text>`;
  }).join('');

  const gradId = 'spkGrad_' + accentColor.replace('#','');
  return `<svg width="${W}" height="${H+12}" viewBox="0 0 ${W} ${H+12}" style="overflow:visible;display:block;width:100%;max-width:${W}px">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${accentColor}"/><stop offset="100%" stop-color="${accentColor}" stop-opacity="0"/></linearGradient></defs>
    ${zeroLine}${fills}${lines}${dots}${labels}
  </svg>`;
}

// ── TREND CHART (modal) ────────────────────────────────────────────
function buildTrendChart(periods) {
  const W = 420, H = 56, PAD = 4;
  const metrics = [
    {key:'rev', label:'收入', color:'#00FFB2'},
    {key:'profit', label:'利润', color:'#FFD700'},
    {key:'contract', label:'合同/在建', color:'#BF80FF'},
  ];

  let svgContent = '';

  metrics.forEach(({key, color}) => {
    const vals = periods.map(p => p[key]);
    const valid = vals.map((v,i) => ({v,i})).filter(x => x.v !== null && typeof x.v === 'number');
    if (valid.length < 2) return;
    const all = valid.map(x => x.v);
    const mn = Math.min(...all, -0.05), mx = Math.max(...all, 0.05);
    const range = mx - mn;
    const xStep = (W - PAD*2) / (PERIODS.length - 1);
    const yOf = v => H - PAD - ((v - mn) / range) * (H - PAD*2);

    let seg = [];
    vals.forEach((v,i) => {
      if (v !== null && typeof v === 'number') {
        seg.push({x: PAD + i*xStep, y: yOf(v)});
      }
    });
    if (seg.length >= 2) {
      const d = seg.map((p,i) => (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
      svgContent += `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>`;
      seg.forEach(p => svgContent += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2" fill="${color}" opacity="0.9"/>`);
    }
  });

  // Zero line
  svgContent += `<line x1="${PAD}" y1="${H/2+PAD}" x2="${W-PAD}" y2="${H/2+PAD}" stroke="rgba(255,255,255,.08)" stroke-width="0.8" stroke-dasharray="3,4"/>`;

  // X-axis labels
  const xStep = (W - PAD*2) / (PERIODS.length - 1);
  PERIODS.forEach((per,i) => {
    const x = PAD + i * xStep;
    svgContent += `<text x="${x.toFixed(1)}" y="${H+13}" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.35)" font-family="var(--mono)">${per}</text>`;
  });

  // Legend
  const legendMetrics = [{label:'收入',color:'#00FFB2'},{label:'利润',color:'#FFD700'},{label:'合同/在建',color:'#BF80FF'}];
  const legendSvg = legendMetrics.map((m,i) =>
    `<svg width="10" height="10" style="vertical-align:middle;margin-right:3px"><line x1="0" y1="5" x2="10" y2="5" stroke="${m.color}" stroke-width="1.8"/><circle cx="5" cy="5" r="2" fill="${m.color}"/></svg><span style="font-size:9px;color:rgba(255,255,255,.45);margin-right:10px">${m.label}</span>`
  ).join('');

  return `
    <div style="padding:10px 14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:4px">
      <div style="font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:rgba(255,255,255,.3);margin-bottom:6px">TREND · 6-PERIOD OVERVIEW &nbsp;·&nbsp; ${legendSvg}</div>
      <svg width="100%" viewBox="0 0 ${W} ${H+18}" style="display:block;overflow:visible">
        <defs>
          <filter id="chartGlow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="${W}" height="${H}" rx="3" fill="rgba(255,255,255,.02)"/>
        ${svgContent}
      </svg>
    </div>`;
}

function fmt(v) {
  if (v === null || v === undefined || v === '-') return '—';
  if (typeof v === 'string') return v;
  const p = Math.round(v * 100);
  return (p >= 0 ? '+' : '') + p + '%';
}

function sigClass(v, metric) {
  if (v === null || v === undefined || v === '-') return 'sig-na';
  if (typeof v === 'string') return 'sig-na';
  // Contract/order: lower thresholds
  const hi = metric === 2 ? 0.30 : 0.20;
  const lo = metric === 2 ? -0.10 : -0.20;
  if (v >= hi) return 'sig-strong-up';
  if (v >= 0.02) return 'sig-up';
  if (v >= lo) return (v >= -0.02 ? 'sig-flat' : 'sig-down');
  return 'sig-strong-down';
}

function sigColor(v) {
  if (v === null || v === undefined || v === '-') return 'rgba(255,255,255,.2)';
  if (typeof v === 'string') return 'rgba(255,255,255,.2)';
  if (v >= 0.20) return '#00FFB2';
  if (v >= 0.02) return '#4ADE80';
  if (v >= -0.02) return 'rgba(255,255,255,.4)';
  if (v >= -0.20) return '#FF6B35';
  return '#FF4D4D';
}

      sectorDiv.appendChild(grid);

      matchedCos.forEach((co, idx) => {
        const pd = co.periods[currentPeriod] || {};
        const rev = pd.rev, profit = pd.profit, contract = pd.contract, note = pd.note;
        const overallSignal = rev !== null && rev !== undefined ? sigColor(rev) : 'rgba(255,255,255,.2)';
        const card = document.createElement('div');
        card.className = 'co-card';
        card.style.setProperty('--card-accent', cfg.color);
        card.dataset.extraCard = (idx >= SHOW_INIT && query === '') ? '1' : '0';
        if (idx >= SHOW_INIT && query === '') card.style.display = 'none';
        card.onclick = () => openModal(co);
        // Build sparkline SVG for revenue across all 6 periods
        const sparkVals = co.periods.map(p => p.rev);
        const sparkSvg = buildSparkline(sparkVals, cfg.color);
        // Trend arrow: compare latest 2 valid periods
        const validRevs = co.periods.map((p,i) => p.rev !== null ? {v:p.rev,i} : null).filter(Boolean);
        let trendArrow = '';
        if (validRevs.length >= 2) {
          const diff = validRevs[validRevs.length-1].v - validRevs[validRevs.length-2].v;
          trendArrow = diff > 0.02 ? '↑' : diff < -0.02 ? '↓' : '→';
          const trendCol = diff > 0.02 ? '#00FFB2' : diff < -0.02 ? '#FF4D4D' : 'rgba(255,255,255,.4)';
          trendArrow = `<span style="font-size:14px;color:${trendCol};margin-left:4px">${trendArrow}</span>`;
        }
        card.innerHTML =
          '<div class="co-header" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">' +
            '<div style="flex:1;min-width:0">' +
              '<div class="co-name" style="font-size:15px;font-weight:700;color:#ffffff;letter-spacing:-.01em;line-height:1.3;margin-bottom:3px">' + co.name + trendArrow + '</div>' +
              '<div class="co-sector" style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:' + cfg.color + ';opacity:.85;letter-spacing:.08em">' + co.sector + ' · ' + ind + '</div>' +
            '</div>' +
            '<div class="co-signal" style="width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;background:' + overallSignal + ';box-shadow:0 0 8px ' + overallSignal + '"></div>' +
          '</div>' +
          '<div class="co-metrics" style="display:flex;gap:0;margin-bottom:0;border-top:1px solid rgba(255,255,255,.07);padding-top:10px">' +
            '<div class="co-metric" style="flex:1;padding-right:8px;border-right:1px solid rgba(255,255,255,.06)">' +
              '<div class="co-metric-label" style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase">收入增速</div>' +
              '<div class="co-metric-val" style="font-family:\'IBM Plex Mono\',monospace;font-size:18px;font-weight:700;color:' + sigColor(rev) + ';letter-spacing:-.02em;line-height:1">' + fmt(rev) + '</div>' +
            '</div>' +
            '<div class="co-metric" style="flex:1;padding:0 8px;border-right:1px solid rgba(255,255,255,.06)">' +
              '<div class="co-metric-label" style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase">利润增速</div>' +
              '<div class="co-metric-val" style="font-family:\'IBM Plex Mono\',monospace;font-size:18px;font-weight:700;color:' + sigColor(profit) + ';letter-spacing:-.02em;line-height:1">' + fmt(profit) + '</div>' +
            '</div>' +
            '<div class="co-metric" style="flex:1;padding-left:8px">' +
              '<div class="co-metric-label" style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase">合同负债</div>' +
              '<div class="co-metric-val" style="font-family:\'IBM Plex Mono\',monospace;font-size:18px;font-weight:700;color:' + sigColor(contract) + ';letter-spacing:-.02em;line-height:1">' + fmt(contract) + '</div>' +
            '</div>' +
          '</div>' +
          '<div style="margin-top:10px">' +
            '<div style="display:flex;gap:3px;margin-bottom:5px;align-items:center">' +
              PERIODS.map((per, pi) => {
                const v = co.periods[pi]?.rev;
                const col = v !== null && v !== undefined ? sigColor(v) : 'rgba(255,255,255,.1)';
                const isCur = pi === currentPeriod;
                return `<div title="${per}: ${fmt(v)}" style="flex:1;height:${isCur?'7':'4'}px;background:${col};border-radius:1px;opacity:${isCur?'1':'0.5'};transition:all .2s;cursor:help"></div>`;
              }).join('') +
            '</div>' +
            '<div style="padding:1px 0 2px">' + sparkSvg + '</div>' +
          '</div>' +
          (note ? '<div style="margin-top:8px;padding:6px 10px;background:rgba(255,255,255,.04);border-left:2px solid ' + cfg.color + '60;font-size:10.5px;color:rgba(255,255,255,.7);line-height:1.55;font-family:\'Noto Sans SC\',sans-serif">' + note + '</div>' : '');
        grid.appendChild(card);
      });

      if (matchedCos.length > SHOW_INIT && query === '') {
        const moreWrap = document.createElement('div');
        moreWrap.style.cssText = 'margin-top:10px;text-align:center';
        const btn = document.createElement('button');
        btn.style.cssText = 'background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65);font-family:\'IBM Plex Mono\',monospace;font-size:11px;letter-spacing:.1em;padding:7px 24px;cursor:pointer;transition:all .2s';
        btn.innerHTML = '展开更多 (' + (matchedCos.length - SHOW_INIT) + ' 家) ▼';
        btn.onmouseenter = () => { btn.style.borderColor='rgba(255,255,255,.4)'; btn.style.color='#fff'; };
        btn.onmouseleave = () => { btn.style.borderColor='rgba(255,255,255,.15)'; btn.style.color='rgba(255,255,255,.65)'; };
        let expanded = false;
        btn.onclick = () => {
          expanded = !expanded;
          grid.querySelectorAll('[data-extra-card="1"]').forEach(c => { c.style.display = expanded ? '' : 'none'; });
          btn.innerHTML = expanded ? '收起 ▲' : '展开更多 (' + (matchedCos.length - SHOW_INIT) + ' 家) ▼';
        };
        moreWrap.appendChild(btn);
        sectorDiv.appendChild(moreWrap);
      }

      indBody.appendChild(sectorDiv);
    });
  });

  setTimeout(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
  }, 50);
}

// Also trigger reveal on scroll
function checkReveal() {
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
    el.classList.add('visible');
  });
}
window.addEventListener('scroll', checkReveal, {passive: true});


function toggleIndSection(ind, headerEl) {
  const body = document.getElementById('ind-body-' + ind);
  const icon = document.getElementById('toggle-icon-' + ind);
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (icon) icon.textContent = hidden ? '▼' : '▶';
}

// ══ MODAL ══════════════════════════════════════════════════════════
function openModal(co) {
  const cfg = IND_CONFIG[co.ind];
  document.getElementById('modal-title').textContent = co.name;
  document.getElementById('modal-sector').textContent = `${co.sector} · ${cfg.name}`;

  let body = `
    <div class="modal-tabs">
      <button class="mtab2 on" onclick="showModalTab(this,'timeline')">时间轴</button>
      <button class="mtab2" onclick="showModalTab(this,'latest')">最新期间</button>
    </div>
    <div id="mt-timeline">
      <div style="margin-bottom:14px">${buildTrendChart(co.periods)}</div>
      <div class="modal-timeline">
        ${co.periods.map((pd, i) => {
          const isLatest = i === co.periods.length - 1;
          const isCurrent = i === currentPeriod;
          const rowBg = isCurrent ? 'rgba(255,215,0,.06)' : isLatest ? 'rgba(255,255,255,.03)' : 'transparent';
          const borderLeft = isCurrent ? '2px solid rgba(255,215,0,.6)' : isLatest ? '2px solid rgba(0,255,178,.3)' : '2px solid transparent';
          return `
          <div class="tl-row" style="background:${rowBg};border-left:${borderLeft};margin-left:-2px;padding-left:2px;border-radius:0 4px 4px 0;transition:background .2s">
            <div class="tl-period" style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:${isCurrent?'700':'500'};letter-spacing:.12em;min-width:56px;padding-top:1px;${isCurrent ? 'color:#FFD700' : isLatest ? 'color:rgba(0,255,178,.85)' : 'color:rgba(255,255,255,.45)'}">${PERIODS[i]}${isCurrent ? ' ●' : ''}</div>
            <div class="tl-bar-wrap" style="flex:1">
              <div style="display:flex;flex-direction:column;gap:5px;flex:1">
                ${['rev','profit','contract'].map((key,ki) => {
                  const labels = ['收入增速','利润增速','合同负债'];
                  const v = pd[key];
                  const barW = v !== null && typeof v === 'number' ? Math.min(Math.abs(v) * 80, 100) : 0;
                  const barCol = sigColor(v);
                  const isNeg = typeof v === 'number' && v < 0;
                  return `<div style="display:flex;align-items:center;gap:10px">
                    <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;color:rgba(255,255,255,.5);width:58px;flex-shrink:0;text-align:right;letter-spacing:.06em">${labels[ki]}</div>
                    <div style="flex:1;height:5px;background:rgba(255,255,255,.09);border-radius:3px;position:relative;max-width:110px">
                      ${barW > 0 ? `<div style="position:absolute;${isNeg?'right:0':'left:0'};top:0;height:100%;width:${barW}%;background:${barCol};border-radius:3px;opacity:.9"></div>` : ''}
                    </div>
                    <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:${barCol};min-width:48px;letter-spacing:-.01em">${fmt(v)}</div>
                  </div>`;
                }).join('')}
                ${pd.note ? `<div style="margin-top:5px;font-size:10.5px;color:rgba(255,255,255,.72);line-height:1.6;font-family:'Noto Sans SC',sans-serif;border-left:2px solid rgba(255,215,0,.3);padding-left:8px;background:rgba(255,215,0,.04);padding:4px 8px;border-radius:0 3px 3px 0">${pd.note}</div>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div id="mt-latest" style="display:none">
      <div class="modal-period-title">${PERIODS[currentPeriod]}</div>
      <div class="modal-metrics-grid">
        <div class="mm"><div class="mm-label">收入增速</div><div class="mm-val" style="color:${sigColor(co.periods[currentPeriod]?.rev)}">${fmt(co.periods[currentPeriod]?.rev)}</div></div>
        <div class="mm"><div class="mm-label">利润增速</div><div class="mm-val" style="color:${sigColor(co.periods[currentPeriod]?.profit)}">${fmt(co.periods[currentPeriod]?.profit)}</div></div>
        <div class="mm"><div class="mm-label">合同负债/在建</div><div class="mm-val" style="color:${sigColor(co.periods[currentPeriod]?.contract)}">${fmt(co.periods[currentPeriod]?.contract)}</div></div>
      </div>
      ${co.periods[currentPeriod]?.note ? `
        <div class="modal-note">
          <div class="modal-note-label">分析备注</div>
          <div class="modal-note-text">${co.periods[currentPeriod].note}</div>
        </div>` : ''}
    </div>
  `;

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showModalTab(btn, tab) {
  document.querySelectorAll('.mtab2').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('mt-timeline').style.display = tab === 'timeline' ? 'block' : 'none';
  document.getElementById('mt-latest').style.display = tab === 'latest' ? 'block' : 'none';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ══ CONTROLS ═══════════════════════════════════════════════════════
function setPeriod(i) {
  currentPeriod = i;
  document.querySelectorAll('.ptab').forEach((b,j) => b.classList.toggle('on', i===j));
  // Fade cards out then re-render
  const cont = document.getElementById('cards-container');
  cont.style.opacity = '0.4';
  cont.style.transition = 'opacity .15s';
  setTimeout(() => {
    renderSummary(); renderHeatmap(); renderCards();
    cont.style.opacity = '1';
  }, 120);
}

function setMetric(i) {
  currentMetric = i;
  document.querySelectorAll('.mtab').forEach((b,j) => b.classList.toggle('on', i===j));
  renderHeatmap();
}

function filterCards() { renderCards(); }

// ══ INIT ═══════════════════════════════════════════════════════════
renderSummary();
renderHeatmap();
renderCards();
</script>

<style>

#toc-btn:hover{color:#fff;background:rgba(255,215,0,.12)}

#toc-panel.open{transform:translateX(0);opacity:1;pointer-events:auto}

<script>
function tocToggle(){
  var p=document.getElementById('toc-panel'),b=document.getElementById('toc-btn');
  var o=p.classList.toggle('open');
  b.style.cssText=o?"opacity:0;pointer-events:none":"opacity:1;pointer-events:auto";
}
function scrollToInd(ind){
  var grid=document.getElementById('grid-'+ind);
  if(grid){var offset=grid.getBoundingClientRect().top+window.pageYOffset-80;window.scrollTo({top:offset,behavior:'smooth'});}
}
</script>

<script>
(function(){
  const glow = document.getElementById('cursor-glow');
  const dot  = document.getElementById('cursor-dot');
  let mx=0,my=0,gx=0,gy=0;
  document.addEventListener('mousemove', e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
  });
  function animGlow(){
    gx+=(mx-gx)*.08; gy+=(my-gy)*.08;
    glow.style.left=gx+'px'; glow.style.top=gy+'px';
    requestAnimationFrame(animGlow);
  }
  animGlow();
  document.addEventListener('mouseleave',()=>{ glow.style.opacity='0'; dot.style.opacity='0'; });
  document.addEventListener('mouseenter',()=>{ glow.style.opacity='1'; dot.style.opacity='1'; });
})();
</script>
